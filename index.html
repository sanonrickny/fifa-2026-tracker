<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0E3B2E" />
  <title>World Cup 26 — Live</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Big+Shoulders+Display:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="brand"><span class="brand-ball">⚽</span> World Cup 26</div>
  <span class="last-updated" id="lastUpdated"></span>
  <button class="notify-btn" id="notifyBtn" onclick="toggleNotify()" aria-label="Toggle goal alerts">🔕</button>
  <div class="live-badge" id="liveBadge" style="display:none">
    <span class="live-dot"></span> LIVE
  </div>
</header>

<main class="main">
  <div class="now-strip" id="nowStrip"></div>

  <div class="panel active" id="panel-bracket">
    <div class="bracket-wrapper">
      <div class="bracket" id="bracketEl"></div>
    </div>
  </div>

  <div class="panel" id="panel-schedule">
    <div id="scheduleList"></div>
  </div>

  <div class="panel" id="panel-groups">
    <div class="groups-grid" id="groupsGrid"></div>
  </div>
</main>

<nav class="tabbar">
  <button class="tab-btn active" onclick="showTab('bracket', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 5h5M4 11h5M9 5v6M9 8h5M14 8v8M4 19h5M4 16v6M14 12h5"/></svg>
    Bracket
  </button>
  <button class="tab-btn" onclick="showTab('schedule', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
    Schedule
  </button>
  <button class="tab-btn" onclick="showTab('groups', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
    Groups
  </button>
</nav>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <button class="modal-close-btn" onclick="closeModal()" aria-label="Close">✕</button>

    <div class="modal-header">
      <div class="modal-round-label" id="mRound"></div>
      <div class="modal-scoreboard">
        <div class="modal-team">
          <div class="modal-flag" id="mHomeFlag"></div>
          <div class="modal-team-name" id="mHomeName"></div>
          <div class="modal-team-code" id="mHomeCode"></div>
        </div>
        <div class="modal-center">
          <div class="modal-score-display upcoming" id="mScore">VS</div>
          <div class="modal-pens" id="mPens" style="display:none"></div>
          <div class="modal-status-badge upcoming" id="mStatusBadge">Upcoming</div>
        </div>
        <div class="modal-team">
          <div class="modal-flag" id="mAwayFlag"></div>
          <div class="modal-team-name" id="mAwayName"></div>
          <div class="modal-team-code" id="mAwayCode"></div>
        </div>
      </div>
    </div>

    <div class="modal-body">
      <div class="modal-meta" id="mMeta"></div>

      <div class="events-section" id="eventsSection" style="display:none">
        <div class="events-title">Match Events</div>
        <div id="eventsList"></div>
      </div>

      <div class="prob-section" id="probSection">
        <div class="prob-section-title">
          <span class="prob-live-dot" id="probLiveDot" style="display:none"></span>
          Win Probability
          <span class="prob-source" id="probSource"></span>
        </div>
        <div id="probContent"><div class="prob-loading">Loading odds…</div></div>
      </div>

      <div class="watch-section-title">Watch free</div>
      <div class="watch-links" id="mFreeLinks"></div>

      <div class="watch-section-title">Streaming</div>
      <div class="watch-links" id="mPaidLinks"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
